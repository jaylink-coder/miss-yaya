# Yaya-125M — GPT-2 scale model for real training
# ~129M total parameters, ~104M non-embedding
# Trains well on a single T4 GPU (Google Colab free tier)

model_name: yaya-125m

architecture:
  vocab_size: 32768
  hidden_size: 768
  intermediate_size: 3072
  num_hidden_layers: 12
  num_attention_heads: 12
  num_key_value_heads: 4       # GQA: 4 KV heads shared across 12 query heads
  max_position_embeddings: 1024

  rope_theta: 10000.0
  rms_norm_eps: 1.0e-5
  tie_word_embeddings: true
  hidden_act: silu
  attention_dropout: 0.0
  attention_bias: false
  mlp_bias: false

vision:
  enabled: false

dtype: float16                  # T4 is float16; swap to bfloat16 for A100
initializer_range: 0.02
