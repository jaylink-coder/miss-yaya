# Training Configuration — Yaya-1B (Kaggle T4 x2)
# 3B Wikipedia tokens, 45,700 steps, 1 clean epoch, no repetition

seed: 42

training:
  per_device_batch_size: 1       # 1B model on T4 — batch=1 to avoid OOM
  gradient_accumulation_steps: 32  # Effective batch = 32 seqs × 2048 = 65K tokens
  learning_rate: 3.0e-4
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  lr_scheduler: wsd
  warmup_steps: 2000
  min_lr_ratio: 0.1
  max_steps: 45800               # 3B tokens / (32 seqs × 2048) ≈ 45,776 steps
  max_seq_length: 2048           # 2x context vs 125M
  dtype: float16                 # T4 does not support bfloat16 natively

checkpointing:
  save_steps: 2000
  save_dir: checkpoints/yaya-1b
  keep_last_n: 3

logging:
  log_steps: 100
  wandb_project: null
  wandb_run_name: null

eval:
  eval_steps: 5000
  eval_samples: 50

data:
  # Prefer mixed multi-domain data when available; fall back to Wikipedia
  # Run 'make mix-pretrain-data' to build data/processed/mixed/
  train_data: data/processed/mixed
  eval_data: data/processed/wikipedia/eval
  tokenizer_path: data/tokenizer/yaya_tokenizer.model
  num_workers: 0                 # Kaggle Jupyter: forked workers hang

distributed:
  strategy: none
  gradient_checkpointing: true   # Essential for 1B on T4
  cpu_offload: false
