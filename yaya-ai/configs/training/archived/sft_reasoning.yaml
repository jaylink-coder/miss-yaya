seed: 42

# Reasoning SFT — Chain-of-Thought + Calculator Tool Use
# Combines: math_combined (3391) + yaya_cot (20) + yaya_reasoning (41) = ~3452 examples
# Resume from math-stage2 latest checkpoint.
# Teaches: step-by-step thinking, <|think|> blocks, <|calc|> tool calls.

training:
  per_device_batch_size: 8
  gradient_accumulation_steps: 2
  learning_rate: 2.0e-5
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  lr_scheduler: cosine
  warmup_steps: 200
  min_lr_ratio: 0.05
  max_steps: 8000
  max_seq_length: 512
  dtype: float32

checkpointing:
  save_steps: 500
  save_dir: checkpoints/yaya-125m-reasoning
  keep_last_n: 4

logging:
  log_steps: 100
  wandb_project: null
  wandb_run_name: null

eval:
  eval_steps: 1000
  eval_samples: 50

data:
  train_data: data/sft/yaya_reasoning_combined.jsonl
  eval_data: data/sft/yaya_reasoning_combined.jsonl
  tokenizer_path: data/tokenizer/yaya_tokenizer.model
  num_workers: 0

distributed:
  strategy: none
  gradient_checkpointing: false
  cpu_offload: false
