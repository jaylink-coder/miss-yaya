# Yaya-125m Training Roadmap
# 16 SFT phases × 2,500 steps = 40,000 total steps
# Each phase fits comfortably in ~2.5 hours on a T4 GPU
# Just re-run the notebook each session — it auto-advances to the next phase
#
# Progress is persisted to HuggingFace Hub after every checkpoint save.

model: yaya-125m
hub_repo: Jaylink-coder/yaya-125m
total_steps: 40000

phases:
  - id: 1
    name: "First Words"
    description: "Random init → basic instruction format"
    step_start: 0
    step_end: 2500
    target_loss: 6.0
    eval_target: 0.05

  - id: 2
    name: "Warm-up"
    description: "Settling into Q&A patterns"
    step_start: 2500
    step_end: 5000
    target_loss: 4.5
    eval_target: 0.10

  - id: 3
    name: "Basic Answers"
    description: "Simple factual questions and short responses"
    step_start: 5000
    step_end: 7500
    target_loss: 3.5
    eval_target: 0.15

  - id: 4
    name: "Arithmetic"
    description: "Basic math: addition, multiplication, simple equations"
    step_start: 7500
    step_end: 10000
    target_loss: 3.0
    eval_target: 0.20

  - id: 5
    name: "Foundation I"
    description: "General knowledge, definitions, explanations"
    step_start: 10000
    step_end: 12500
    target_loss: 2.5
    eval_target: 0.25

  - id: 6
    name: "Foundation II"
    description: "Longer responses, structured answers"
    step_start: 12500
    step_end: 15000
    target_loss: 2.2
    eval_target: 0.30

  - id: 7
    name: "Word Problems"
    description: "Applied math in context, unit conversions"
    step_start: 15000
    step_end: 17500
    target_loss: 2.0
    eval_target: 0.35

  - id: 8
    name: "Reasoning I"
    description: "Multi-step thinking, basic chain-of-thought"
    step_start: 17500
    step_end: 20000
    target_loss: 1.8
    eval_target: 0.40

  - id: 9
    name: "Reasoning II"
    description: "Algebra, fractions, percentages"
    step_start: 20000
    step_end: 22500
    target_loss: 1.6
    eval_target: 0.50

  - id: 10
    name: "Reasoning III"
    description: "Complex multi-step problems, logical deduction"
    step_start: 22500
    step_end: 25000
    target_loss: 1.5
    eval_target: 0.55

  - id: 11
    name: "Advanced Math I"
    description: "Geometry, quadratics, logarithms"
    step_start: 25000
    step_end: 27500
    target_loss: 1.4
    eval_target: 0.60

  - id: 12
    name: "Advanced Math II"
    description: "Statistics, probability, derivatives"
    step_start: 27500
    step_end: 30000
    target_loss: 1.3
    eval_target: 0.65

  - id: 13
    name: "Tool Use I"
    description: "Calculator tool integration for exact answers"
    step_start: 30000
    step_end: 32500
    target_loss: 1.25
    eval_target: 0.68

  - id: 14
    name: "Tool Use II"
    description: "Complex tool chains, multi-step calculations"
    step_start: 32500
    step_end: 35000
    target_loss: 1.2
    eval_target: 0.72

  - id: 15
    name: "Mastery I"
    description: "High difficulty problems across all topics"
    step_start: 35000
    step_end: 37500
    target_loss: 1.15
    eval_target: 0.75

  - id: 16
    name: "Mastery II"
    description: "Final polish — edge cases and hard problems"
    step_start: 37500
    step_end: 40000
    target_loss: 1.1
    eval_target: 0.80

  - id: 17
    name: "Alignment"
    description: "DPO fine-tuning for quality and helpfulness"
    step_start: 40000
    step_end: 42500
    target_loss: 0.8
    eval_target: 0.85
    phase_type: dpo
