seed: 42

# Merged SFT: 12,290 clean + 15,067 backup + 70 new QA = 27,427 examples.
# max_seq_length bumped to 512 to accommodate longer high-quality examples.
# Lower LR than focused run (larger dataset, more stable gradients).
training:
  per_device_batch_size: 8
  gradient_accumulation_steps: 2
  learning_rate: 3.0e-5
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  lr_scheduler: cosine
  warmup_steps: 500
  min_lr_ratio: 0.05
  max_steps: 20000
  max_seq_length: 512
  dtype: float32

checkpointing:
  save_steps: 2000
  save_dir: checkpoints/yaya-tiny-sft-merged
  keep_last_n: 3

logging:
  log_steps: 100
  wandb_project: null
  wandb_run_name: null

eval:
  eval_steps: 2000
  eval_samples: 50

data:
  train_data: data/sft/yaya_instruct_merged.jsonl
  eval_data: data/sft/yaya_instruct_clean_eval.jsonl
  tokenizer_path: data/tokenizer/yaya_tokenizer.model
  num_workers: 0

distributed:
  strategy: none
  gradient_checkpointing: false
  cpu_offload: false
