# Yaya-350M — Intermediate scaling milestone
# ~350M total parameters, ~300M non-embedding
# Fits on a single T4/L4 GPU with gradient checkpointing
# Recommended: A100/L40 for full-speed training, T4 with grad_accum=16
#
# Scaling rationale (from 125M):
#   hidden_size:  768 → 1024  (1.33x)
#   layers:       12  → 24    (2x)
#   heads:        12  → 16    (1.33x)
#   kv_heads:     4   → 4     (same — more GQA compression)
#   context:      1024 → 2048 (2x — minimum viable for RAG/chat)
#   ffn:          3072 → 4096 (4x hidden, standard ratio)

model_name: yaya-350m

architecture:
  vocab_size: 32768
  hidden_size: 1024
  intermediate_size: 4096
  num_hidden_layers: 24
  num_attention_heads: 16
  num_key_value_heads: 4       # GQA: 4 KV heads shared across 16 query heads
  max_position_embeddings: 2048

  rope_theta: 10000.0
  rms_norm_eps: 1.0e-5
  tie_word_embeddings: true
  hidden_act: silu
  attention_dropout: 0.0
  attention_bias: false
  mlp_bias: false

vision:
  enabled: false

dtype: float16                  # T4 is float16; swap to bfloat16 for A100/H100
initializer_range: 0.02
