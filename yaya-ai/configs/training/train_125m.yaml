# Training Configuration — Yaya-125M (Kaggle T4)
# 500M Wikipedia tokens, 7600 steps, no data repetition

seed: 42

training:
  per_device_batch_size: 8
  gradient_accumulation_steps: 8      # effective batch = 64 sequences
  learning_rate: 1.0e-5
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  lr_scheduler: wsd
  warmup_steps: 500
  min_lr_ratio: 0.1
  max_steps: 3200
  max_seq_length: 1024
  dtype: bfloat16

checkpointing:
  save_steps: 500
  save_dir: checkpoints/yaya-125m
  keep_last_n: 5

logging:
  log_steps: 50
  wandb_project: null
  wandb_run_name: null

eval:
  eval_steps: 1000
  eval_samples: 50

data:
  train_data: data/processed/wikipedia/train
  eval_data: data/processed/wikipedia/eval
  tokenizer_path: data/tokenizer/yaya_tokenizer.model
  num_workers: 2

distributed:
  strategy: none
  gradient_checkpointing: false
  cpu_offload: false
