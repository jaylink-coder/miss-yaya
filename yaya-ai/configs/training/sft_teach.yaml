checkpointing:
  keep_last_n: 5
  save_dir: checkpoints/yaya-125m-sft
  save_steps: 1000
data:
  eval_data: data/sft/yaya_reasoning_large.jsonl
  num_workers: 0
  tokenizer_path: data/tokenizer/yaya_tokenizer.model
  train_data: data/sft/yaya_reasoning_large.jsonl
distributed:
  cpu_offload: false
  gradient_checkpointing: true
  strategy: none
eval:
  eval_samples: 200
  eval_steps: 2000
logging:
  log_steps: 100
  wandb_project: yaya-ai
  wandb_run_name: yaya-125m-sft
seed: 42
training:
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_epsilon: 1.0e-08
  batch_size: 2
  checkpoint_dir: checkpoints/yaya-125m-sft/teach
  dataset: data/sft/teach/quick_facts.jsonl
  dtype: float32
  gradient_accumulation_steps: 2
  learning_rate: 5.0e-05
  lr_scheduler: cosine
  max_grad_norm: 1.0
  max_seq_length: 512
  max_steps: 200
  min_lr_ratio: 0.05
  per_device_batch_size: 4
  save_steps: 200
  seq_len: 64
  wandb_project: null
  warmup_steps: 500
  weight_decay: 0.01
