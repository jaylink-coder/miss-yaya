# SFT (Supervised Fine-Tuning) Configuration — Yaya-1.5B
# Phase 2: Instruction tuning after pre-training

seed: 42

training:
  per_device_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-5
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  lr_scheduler: cosine
  warmup_steps: 200
  min_lr_ratio: 0.0
  max_steps: 10000
  max_seq_length: 4096
  dtype: bfloat16

checkpointing:
  save_steps: 500
  save_dir: checkpoints/yaya-1.5b-sft
  keep_last_n: 3

logging:
  log_steps: 10
  wandb_project: yaya-ai
  wandb_run_name: yaya-1.5b-sft

eval:
  eval_steps: 500
  eval_samples: 200

data:
  train_data: data/sft/train
  eval_data: data/sft/eval
  tokenizer_path: data/tokenizer/yaya_tokenizer.model
  num_workers: 4

distributed:
  strategy: deepspeed_zero2
  gradient_checkpointing: true
  cpu_offload: false
