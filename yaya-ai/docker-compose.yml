version: "3.8"

services:
  # Train yaya-125m (primary model, ~129M params, runs on T4/consumer GPU)
  train:
    build: .
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
      - ./configs:/app/configs
      - ./logs:/app/logs
    command: >
      python scripts/train_sft.py
        --model_config configs/model/yaya_125m.yaml
        --train_config configs/training/sft_125m.yaml

  # Serve yaya-125m REST API
  serve:
    build: .
    runtime: nvidia
    ports:
      - "8000:8000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./data/tokenizer:/app/data/tokenizer
    command: >
      python scripts/serve.py --port 8000

  # Train yaya-1.5b (scaled model, requires multi-GPU)
  train-1.5b:
    build: .
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
      - ./configs:/app/configs
      - ./logs:/app/logs
    command: >
      python scripts/train.py
        --model_config configs/model/yaya_1_5b.yaml
        --train_config configs/training/train_1_5b.yaml
