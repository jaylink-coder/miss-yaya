# Data Pipeline Configuration

data_pipeline:
  # Source directories
  sources:
    web_text:
      path: data/raw/web
      ratio: 0.45
      pattern: '*.txt'
    code:
      path: data/raw/code
      ratio: 0.12
      pattern: '*.txt'
    books:
      path: data/raw/books
      ratio: 0.12
      pattern: '*.txt'
    academic:
      path: data/raw/academic
      ratio: 0.08
      pattern: '*.txt'
    math:
      path: data/raw/math
      ratio: 0.06
      pattern: '*.txt'
    conversational:
      path: data/raw/conversational
      ratio: 0.07
      pattern: '*.txt'
    domain_business:
      path: data/raw/business
      ratio: 0.05
      pattern: '*.txt'
    multilingual:
      path: data/raw/multilingual
      ratio: 0.05
      pattern: '*.txt'

  # Output
  output_dir: data/processed
  shard_size: 100000000

  # Cleaning
  cleaning:
    remove_urls: true
    remove_emails: true
    normalize_whitespace: true
    normalize_unicode: true
    min_line_length: 10

  # Filtering
  filtering:
    min_doc_length: 100
    max_doc_length: 1000000
    max_special_char_ratio: 0.3
    min_alpha_ratio: 0.5

  # Deduplication
  deduplication:
    enabled: true
    method: sha256
