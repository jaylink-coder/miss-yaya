# Yaya-125M SFT — canonical config
# Dataset: yaya_reasoning_large.jsonl (~262K examples)
#   = GSM8K + MetaMath + OpenHermes + Yaya reasoning/math
#
# T4  (15GB): batch=4, grad_accum=8 → eff=32, ~600 tok/s → 1 epoch ≈ 4 hrs
# A100(40GB): batch=8, grad_accum=4 → eff=32, ~3000 tok/s → 1 epoch ≈ 50 min
#
# Loss target: <1.5 by step 20k on pretrained base; <2.5 from scratch
# dtype is auto-overridden to bfloat16 on A100 by kaggle_run_sft.py

seed: 42

training:
  per_device_batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  lr_scheduler: cosine
  warmup_steps: 500
  min_lr_ratio: 0.05
  max_steps: 40000
  max_seq_length: 512
  dtype: float16          # T4 default — overridden to bfloat16 on A100

checkpointing:
  save_steps: 1000
  save_dir: checkpoints/yaya-125m-sft
  keep_last_n: 5

logging:
  log_steps: 100
  wandb_project: yaya-ai
  wandb_run_name: yaya-125m-sft

eval:
  eval_steps: 2000
  eval_samples: 200

data:
  train_data: data/sft/yaya_reasoning_large.jsonl
  eval_data: data/sft/yaya_reasoning_large.jsonl
  tokenizer_path: data/tokenizer/yaya_tokenizer.model
  num_workers: 0

distributed:
  strategy: none
  gradient_checkpointing: true
  cpu_offload: false
