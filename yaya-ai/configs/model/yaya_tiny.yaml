# Yaya-Tiny — Minimal model for pipeline validation
# ~1M parameters, trains in minutes on CPU

model_name: yaya-tiny

architecture:
  vocab_size: 32768
  hidden_size: 128
  intermediate_size: 256
  num_hidden_layers: 4
  num_attention_heads: 4
  num_key_value_heads: 2
  max_position_embeddings: 512

  rope_theta: 10000.0
  rms_norm_eps: 1.0e-5
  tie_word_embeddings: true
  hidden_act: silu
  attention_dropout: 0.0
  attention_bias: false
  mlp_bias: false

vision:
  enabled: false

dtype: float32
initializer_range: 0.02
