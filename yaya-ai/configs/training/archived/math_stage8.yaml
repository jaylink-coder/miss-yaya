seed: 42

# Math Stage 8 — Calculus & Beyond
# 300 examples: limits, derivatives (power rule), integrals, conceptual questions.
# Longest answers — use max_seq_length=512.
training:
  per_device_batch_size: 8
  gradient_accumulation_steps: 2
  learning_rate: 1.5e-5
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  lr_scheduler: cosine
  warmup_steps: 60
  min_lr_ratio: 0.05
  max_steps: 2000
  max_seq_length: 512
  dtype: float32

checkpointing:
  save_steps: 500
  save_dir: checkpoints/yaya-tiny-math-stage8
  keep_last_n: 3

logging:
  log_steps: 100
  wandb_project: null
  wandb_run_name: null

eval:
  eval_steps: 500
  eval_samples: 30

data:
  train_data: data/sft/math/yaya_math_stage8_calculus.jsonl
  eval_data: data/sft/math/yaya_math_stage8_calculus.jsonl
  tokenizer_path: data/tokenizer/yaya_tokenizer.model
  num_workers: 0

distributed:
  strategy: none
  gradient_checkpointing: false
  cpu_offload: false
