seed: 42

training:
  per_device_batch_size: 4
  gradient_accumulation_steps: 2
  learning_rate: 2.0e-5
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  lr_scheduler: cosine
  warmup_steps: 50
  min_lr_ratio: 0.0
  max_steps: 5000
  max_seq_length: 256
  dtype: float32

checkpointing:
  save_steps: 500
  save_dir: checkpoints/yaya-tiny-sft
  keep_last_n: 2

logging:
  log_steps: 50
  wandb_project: null
  wandb_run_name: null

eval:
  eval_steps: 500
  eval_samples: 20

data:
  train_data: data/sft/yaya_instruct.jsonl
  eval_data: data/sft/yaya_instruct_eval.jsonl  # Held-out eval — not in training data
  tokenizer_path: data/tokenizer/yaya_tokenizer.model
  num_workers: 0

distributed:
  strategy: none
  gradient_checkpointing: false
  cpu_offload: false
