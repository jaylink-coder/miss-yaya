# DPO (Direct Preference Optimization) Configuration — Yaya-1.5B
# Phase 3: Alignment training after SFT

seed: 42

training:
  per_device_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 5.0e-7
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  lr_scheduler: cosine
  warmup_steps: 100
  min_lr_ratio: 0.0
  max_steps: 2000
  max_seq_length: 2048
  dtype: bfloat16

# DPO-specific
dpo:
  beta: 0.1
  loss_type: sigmoid
  label_smoothing: 0.0
  reference_free: false

checkpointing:
  save_steps: 500
  save_dir: checkpoints/yaya-1.5b-dpo
  keep_last_n: 3

logging:
  log_steps: 10
  wandb_project: yaya-ai
  wandb_run_name: yaya-1.5b-dpo

eval:
  eval_steps: 500
  eval_samples: 100

data:
  train_data: data/preferences/train.jsonl
  eval_data: data/preferences/eval.jsonl
  tokenizer_path: data/tokenizer/yaya_tokenizer.model
  num_workers: 4

distributed:
  strategy: deepspeed_zero2
  gradient_checkpointing: true
  cpu_offload: false
