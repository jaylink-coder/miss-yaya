# SFT Configuration — Yaya-125M (Google Colab T4)
# Run after pretraining to teach instruction following

seed: 42

training:
  per_device_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-5
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  lr_scheduler: cosine
  warmup_steps: 200
  min_lr_ratio: 0.0
  max_steps: 10000
  max_seq_length: 512
  dtype: float16

checkpointing:
  save_steps: 1000
  save_dir: checkpoints/yaya-125m-sft
  keep_last_n: 2

logging:
  log_steps: 10
  wandb_project: yaya-ai
  wandb_run_name: yaya-125m-sft

eval:
  eval_steps: 500
  eval_samples: 50

data:
  train_data: data/sft/yaya_instruct.jsonl
  eval_data: data/sft/yaya_instruct_eval.jsonl  # Held-out eval — not in training data
  tokenizer_path: data/tokenizer/yaya_tokenizer.model
  num_workers: 0

distributed:
  strategy: none
  gradient_checkpointing: false
  cpu_offload: false
