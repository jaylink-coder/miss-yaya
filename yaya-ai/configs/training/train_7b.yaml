# Training Configuration — Yaya-7B
# Designed for 8x A100 80GB or equivalent

seed: 42

training:
  per_device_batch_size: 2
  gradient_accumulation_steps: 16
  learning_rate: 1.5e-4
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  lr_scheduler: cosine
  warmup_steps: 4000
  min_lr_ratio: 0.1
  max_steps: 250000
  max_seq_length: 4096
  dtype: bfloat16

checkpointing:
  save_steps: 2000
  save_dir: checkpoints/yaya-7b
  keep_last_n: 5

logging:
  log_steps: 10
  wandb_project: yaya-ai
  wandb_run_name: yaya-7b-pretrain

eval:
  eval_steps: 5000
  eval_samples: 500

data:
  train_data: data/processed/train
  eval_data: data/processed/eval
  tokenizer_path: data/tokenizer/yaya_tokenizer.model
  num_workers: 8

distributed:
  strategy: deepspeed_zero3
  gradient_checkpointing: true
  cpu_offload: false
