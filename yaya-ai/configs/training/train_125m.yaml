# Training Configuration — Yaya-125M (Google Colab T4)
# Single T4 GPU, float16, ~12h session

seed: 42

training:
  per_device_batch_size: 8
  gradient_accumulation_steps: 8      # effective batch = 64 sequences
  learning_rate: 3.0e-4
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  lr_scheduler: cosine
  warmup_steps: 2000
  min_lr_ratio: 0.1
  max_steps: 100000
  max_seq_length: 1024
  dtype: float16

checkpointing:
  save_steps: 1000
  save_dir: checkpoints/yaya-125m
  keep_last_n: 3

logging:
  log_steps: 50
  wandb_project: null
  wandb_run_name: null

eval:
  eval_steps: 1000
  eval_samples: 50

data:
  train_data: data/processed/openwebtext/train
  eval_data: data/processed/openwebtext/eval
  tokenizer_path: data/tokenizer/yaya_tokenizer.model
  num_workers: 2

distributed:
  strategy: none
  gradient_checkpointing: false
  cpu_offload: false
