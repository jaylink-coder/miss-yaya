# Serving Configuration

serving:
  host: '0.0.0.0'
  port: 8000
  model_name: yaya

  # Generation defaults
  generation:
    max_new_tokens: 256
    temperature: 0.7
    top_k: 50
    top_p: 0.9
    repetition_penalty: 1.1

  # Performance
  max_batch_size: 32
  max_concurrent_requests: 100
  timeout_seconds: 60

  # Quantization for serving
  quantization:
    enabled: false
    bits: 8
    group_size: 128
