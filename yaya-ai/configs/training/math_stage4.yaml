seed: 42

# Math Stage 4 — Algebra
# 400 examples: slope-intercept, quadratics (factoring), systems of equations, polynomials, logs.
# Longer explanations — bump max_seq_length.
training:
  per_device_batch_size: 8
  gradient_accumulation_steps: 2
  learning_rate: 2.0e-5
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  lr_scheduler: cosine
  warmup_steps: 80
  min_lr_ratio: 0.05
  max_steps: 3000
  max_seq_length: 384
  dtype: float32

checkpointing:
  save_steps: 500
  save_dir: checkpoints/yaya-tiny-math-stage4
  keep_last_n: 3

logging:
  log_steps: 100
  wandb_project: null
  wandb_run_name: null

eval:
  eval_steps: 500
  eval_samples: 30

data:
  train_data: data/sft/math/yaya_math_stage4_algebra.jsonl
  eval_data: data/sft/math/yaya_math_stage4_algebra.jsonl
  tokenizer_path: data/tokenizer/yaya_tokenizer.model
  num_workers: 0

distributed:
  strategy: none
  gradient_checkpointing: false
  cpu_offload: false
