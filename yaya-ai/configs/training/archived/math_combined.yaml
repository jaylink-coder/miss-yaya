seed: 42

# Math Combined — All 8 Stages Together (Tool-Use + Reasoning Edition)
# 28,129 examples: all stages trained simultaneously to prevent catastrophic forgetting.
# yaya-tiny (4.8M) cannot retain knowledge across sequential stages — train all at once.
training:
  per_device_batch_size: 8
  gradient_accumulation_steps: 2
  learning_rate: 2.5e-5
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  lr_scheduler: cosine
  warmup_steps: 200
  min_lr_ratio: 0.05
  max_steps: 20000
  max_seq_length: 512
  dtype: float32

checkpointing:
  save_steps: 1000
  save_dir: checkpoints/yaya-tiny-math-combined
  keep_last_n: 3

logging:
  log_steps: 100
  wandb_project: null
  wandb_run_name: null

eval:
  eval_steps: 1000
  eval_samples: 50

data:
  train_data: data/sft/math/yaya_math_combined.jsonl
  eval_data: data/sft/math/yaya_math_combined.jsonl
  tokenizer_path: data/tokenizer/yaya_tokenizer.model
  num_workers: 0

distributed:
  strategy: none
  gradient_checkpointing: false
  cpu_offload: false
